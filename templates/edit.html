<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Task - Task Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <div class="dark-mode-toggle">
        <label><input type="checkbox" id="darkToggle"> 🌙 Dark Mode</label>
    </div>
    <h2>Edit Task</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
            <div class="toast">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="task-cards">
        <div class="task-card">
            <form method="POST">
                <div class="card-header">
                    <input type="text" name="title" placeholder="Task Title" value="{{ task[2] if task else '' }}" required>
                    <select name="priority">
                        <option value="High" {% if task and task[5]=='High' %}selected{% endif %}>High 🔴</option>
                        <option value="Medium" {% if task and task[5]=='Medium' %}selected{% endif %}>Medium 🟡</option>
                        <option value="Low" {% if task and task[5]=='Low' %}selected{% endif %}>Low 🟢</option>
                    </select>
                </div>
                <textarea name="description" placeholder="Description">{{ task[3] if task else '' }}</textarea>
                <input type="date" name="deadline" value="{{ task[4] if task else '' }}" required>
                <button type="submit">Update Task 🔄</button>
            </form>
            <p><a href="{{ url_for('index') }}">← Back to Dashboard</a></p>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
